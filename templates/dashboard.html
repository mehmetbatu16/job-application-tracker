{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card p-4 mb-4 shadow-sm">
            <h2 class="mb-4">Welcome, !</h2>
            <a href="/logout" class="btn btn-outline-danger btn-sm mb-4" style="max-width: 100px;">Logout</a>
            
            <h3 class="mb-3">Add New Job Application</h3>
            <form method="POST" action="/dashboard">
                <div class="mb-3">
                    <label class="form-label">Company Name:</label>
                    <input type="text" name="company" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Position:</label>
                    <input type="text" name="position" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Status:</label>
                    <select name="status" class="form-control">
                        <option value="Applied">Applied</option>
                        <option value="Interviewing">Interviewing</option>
                        <option value="Offered">Offered</option>
                        <option value="Rejected">Rejected</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Date:</label>
                    <input type="date" name="date" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Notes:</label>
                    <textarea name="notes" class="form-control" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-success">Add Application</button>
            </form>
        </div>

        <div class="card p-4 shadow-sm">
            <h3 class="mb-3">Your Job Applications</h3>
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>Company</th>
                            <th>Position</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Notes</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="6" class="text-center">No applications tracked yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
